<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script>
    [1, 2, 3, 4, 5].forEach(num => {
let square = num * num;
let type = square % 2 == 0 ? "even" : "odd";
document.write('Number:', num, ' Square:', square, ' Its ', type, '<br>');
    });
</script>
</body>
</html>
